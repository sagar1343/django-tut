{% extends 'base.html' %}

{% block content %}
<div>
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="{% url 'home' %}" class="text-xl font-bold text-slate-900 flex items-center gap-2">
                <span class="material-icons-outlined text-indigo-600">work</span>
                LakshyaIn
            </a>
            <a id="addJobBtn" href="{% url 'create-job' %}"
                class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors flex items-center gap-1.5">
                <span class="material-icons-outlined text-sm leading-none">add</span>
                Add Job
            </a>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-14 text-center">
        <h1 class="text-3xl sm:text-4xl font-bold text-slate-900">Discover Opportunities</h1>
        <p class="mt-2 text-slate-500">Explore jobs from top companies.</p>
    </section>

    <main class="max-w-6xl mx-auto px-6 pb-16">
        <div id="jobsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-5">

            {% for job in jobs %}
            <div class="card bg-base-100 w-96 shadow-sm">
                <figure>
                    <img src="{{ job.logo.url }}" alt="logo" class="w-full" />
                </figure>
                <div class="card-body">
                    <h2 class="card-title">{{ job.title }}</h2>
                    <p>{{ job.description }}</p>
                    <div class="card-actions justify-end">
                        <a href="{% url 'update-job' job.id %}" class="btn btn-accent">Edit</a>
                        <form action="{% url 'delete-job' job.id %}" method="post">
                            {% csrf_token %}
                            <button class="btn btn-error" type="submit">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}

            <div id="emptyState" class="hidden text-center py-16">
                <p class="text-slate-500">No jobs posted yet. Click "Add Job" to get started.</p>
            </div>
        </div>
    </main>
</div>
{% endblock %}
